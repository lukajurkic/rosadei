<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosa Dei - Satenske ruže i buketi</title>
    <!-- Učitavanje elegantnih fontova s Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        /* Osnovni reset i paleta boja s vizitke */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --bg-color: #fdf8fa; /* Svijetla krem/roza pozadina */
            --primary-color: #3a1d40; /* Tamnoljubičasta s vizitke */
            --accent-pink: rgba(243, 178, 206, 0.4); /* Akvarel roza za kuteve */
        }

        body {
            background-color: #f5eff2;
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Kontejner koji glumi fizičku vizitku */
        .business-card {
            background: radial-gradient(circle at top left, var(--accent-pink) 0%, transparent 35%),
                        radial-gradient(circle at bottom right, var(--accent-pink) 0%, transparent 35%),
                        var(--bg-color);
            width: 100%;
            max-width: 850px;
            border: 1px solid rgba(58, 29, 64, 0.2);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            position: relative;
            margin-bottom: 50px;
            margin-top: 20px;
        }

        /* Unutarnji tanki obrub s vizitke */
        .card-inner-border {
            border: 1px solid rgba(58, 29, 64, 0.15);
            border-radius: 8px;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.2fr 0.1fr 1fr;
            align-items: center;
        }

        /* Lijeva strana vizitke (Logotip i Slogan) */
        .brand-section {
            text-align: center;
            padding-right: 20px;
        }

        .logo-text {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            line-height: 1;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .main-subtitle {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .slogan {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            font-style: italic;
            color: #613469;
        }

        /* Vertikalna linija u sredini */
        .divider-vertical {
            width: 1px;
            background-color: rgba(58, 29, 64, 0.3);
            height: 80%;
            justify-self: center;
        }

        /* Desna strana vizitke (Kontakt podaci) */
        .contact-section {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
        }

        .contact-row a {
            color: var(--primary-color);
            text-decoration: none;
            transition: opacity 0.2s;
            font-weight: 500;
        }

        .contact-row a:hover {
            opacity: 0.7;
        }

        .contact-row span {
            font-size: 1.3rem;
            font-weight: 400;
        }

        /* Horizontalne linije sa srcem */
        .heart-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--primary-color);
            opacity: 0.5;
            font-size: 0.8rem;
            margin: 5px 0;
        }
        
        .heart-divider::before, .heart-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--primary-color);
        }
        
        .heart-divider:not(:empty)::before { margin-right: .5em; }
        .heart-divider:not(:empty)::after { margin-left: .5em; }

        /* Društvene mreže i web ikone */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 5px;
        }

        .social-icons a {
            color: var(--primary-color);
            transition: transform 0.2s;
        }

        .social-icons a:hover {
            transform: scale(1.1);
        }

        .social-icons svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .web-domain {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-top: -5px;
        }

        /* Donji natpis s vizitke */
        .card-footer-tags {
            grid-column: span 3;
            border-top: 1px solid rgba(58, 29, 64, 0.3);
            margin-top: 25px;
            padding-top: 15px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* --- SEKCIJA ZA GALERIJU --- */
        .gallery-container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            margin-bottom: 60px;
        }

        .gallery-title {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .gallery-title::after {
            content: '♥';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .gallery img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 4px solid white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery img:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(58, 29, 64, 0.15);
        }

        /* Prilagodba za mobitele (Responsive) */
        @media (max-width: 768px) {
            .card-inner-border {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .brand-section {
                padding-right: 0;
            }

            .divider-vertical {
                display: none;
            }

            .contact-section {
                padding-left: 0;
                align-items: center;
            }

            .card-footer-tags {
                grid-column: span 1;
                font-size: 0.75rem;
            }
            
            .logo-text {
                font-size: 3.5rem;
            }
        }
        .site-footer {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(58, 29, 64, 0.15);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(58, 29, 64, 0.7);
        }
    </style>
</head>
